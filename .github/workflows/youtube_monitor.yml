name: YouTube → LinkedIn Bot

on:
  schedule:
    - cron: '0 */2 * * *'  # Alle 2 Stunden
  workflow_dispatch:         # Manueller Trigger im GitHub Actions Tab

permissions:
  contents: write

jobs:
  check-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn bot
        run: python -m linkedin_bot.main
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and push new posts
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/ last_seen.json
          git diff --cached --quiet || git commit -m "bot: new LinkedIn post for ${{ env.NEW_VIDEO_ID }}"
          git push

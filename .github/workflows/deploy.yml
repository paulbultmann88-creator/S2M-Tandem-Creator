name: Deploy Einhorn Schach to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/chess-learning-app-Cxka6

# Erlaubt GitHub Pages Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert parallele Deployments
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chess-app/package-lock.json

      - name: Install dependencies
        working-directory: chess-app
        run: npm ci

      - name: Build
        working-directory: chess-app
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chess-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
